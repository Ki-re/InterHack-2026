# Homelab configuration — served via Cloudflare Zero Trust tunnel.
# No certbot, no SSL certificates. Cloudflare handles HTTPS termination.
# cloudflared runs on the LXC host and points to http://localhost:80.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/nginx.homelab.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile.prod
    environment:
      APP_NAME: ${APP_NAME}
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ELEVEN_LABS_API_KEY: ${ELEVEN_LABS_API_KEY}
      ELEVEN_LABS_VOICE_ID_CA: ${ELEVEN_LABS_VOICE_ID_CA}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
    volumes:
      - db_data:/app/db
      - ./IA:/app/ia_data:ro
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
